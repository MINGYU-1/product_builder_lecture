<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>제휴 문의</title>
    <style>
        :root {
            --primary-color: #4a90e2;
            --bg-color: #f4f7f6;
            --text-color: #333;
        }
        body {
            font-family: 'Pretendard', -apple-system, BlinkMacSystemFont, system-ui, Roboto, sans-serif;
            background-color: var(--bg-color);
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            margin: 0;
        }
        .form-container {
            background: white;
            padding: 2rem;
            border-radius: 12px;
            box-shadow: 0 4px 20px rgba(0,0,0,0.1);
            width: 100%;
            max-width: 500px;
        }
        h2 {
            margin-top: 0;
            color: var(--text-color);
            text-align: center;
            margin-bottom: 1.5rem;
        }
        .form-group {
            margin-bottom: 1rem;
        }
        label {
            display: block;
            margin-bottom: 0.5rem;
            font-weight: 600;
            font-size: 0.9rem;
        }
        input, select, textarea {
            width: 100%;
            padding: 0.75rem;
            border: 1px solid #ddd;
            border-radius: 6px;
            box-sizing: border-box;
            font-size: 1rem;
        }
        input:focus, textarea:focus {
            outline: none;
            border-color: var(--primary-color);
            box-shadow: 0 0 0 2px rgba(74, 144, 226, 0.2);
        }
        button {
            width: 100%;
            padding: 0.75rem;
            background-color: var(--primary-color);
            color: white;
            border: none;
            border-radius: 6px;
            font-size: 1rem;
            font-weight: 600;
            cursor: pointer;
            transition: background-color 0.2s;
            margin-top: 1rem;
        }
        button:hover {
            background-color: #357abd;
        }
    </style>
</head>
<body>

<div class="form-container">
    <h2>🤝 제휴 문의</h2>
    <form action="https://formspree.io/f/mjgavywe" method="POST">
        <div class="form-group">
            <label for="name">성함 / 담당자명</label>
            <input type="text" id="name" name="name" placeholder="홍길동" required>
        </div>
        
        <div class="form-group">
            <label for="email">이메일 주소</label>
            <input type="email" id="email" name="_replyto" placeholder="example@domain.com" required>
        </div>

        <div class="form-group">
            <label for="company">회사/단체명</label>
            <input type="text" id="company" name="company" placeholder="회사명을 입력해주세요">
        </div>

        <div class="form-group">
            <label for="type">문의 유형</label>
            <select id="type" name="inquiry-type">
                <option value="business">비즈니스 제휴</option>
                <option value="marketing">마케팅/광고</option>
                <option value="content">콘텐츠 협업</option>
                <option value="other">기타</option>
            </select>
        </div>

        <div class="form-group">
            <label for="message">문의 내용</label>
            <textarea id="message" name="message" rows="5" placeholder="상세한 내용을 입력해주세요" required></textarea>
        </div>

        <!-- 스팸 방지 및 리다이렉트 설정 -->
        <input type="hidden" name="_subject" value="새로운 제휴 문의가 접수되었습니다!">
        
        <button type="submit">문의 보내기</button>
    </form>
</div>

</body>
</html>
