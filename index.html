<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>제휴 문의</title>
    <style>
        body { font-family: -apple-system, system-ui, sans-serif; background: #f4f7f6; display: flex; justify-content: center; align-items: center; min-height: 100vh; margin: 0; }
        .form-card { background: white; padding: 40px; border-radius: 15px; box-shadow: 0 10px 25px rgba(0,0,0,0.05); width: 100%; max-width: 400px; }
        h1 { font-size: 22px; color: #333; margin-bottom: 25px; text-align: center; }
        .input-group { margin-bottom: 15px; }
        label { display: block; font-size: 13px; font-weight: 600; color: #666; margin-bottom: 5px; }
        input, textarea { width: 100%; padding: 12px; border: 1px solid #ddd; border-radius: 8px; box-sizing: border-box; font-size: 15px; }
        button { width: 100%; padding: 14px; background: #2563eb; color: white; border: none; border-radius: 8px; font-weight: bold; cursor: pointer; margin-top: 10px; transition: 0.2s; }
        button:hover { background: #1d4ed8; }
    </style>
</head>
<body>
    <div class="form-card">
        <h1>🤝 제휴 문의하기</h1>
        <form action="https://formspree.io/f/mjgavywe" method="POST">
            <div class="input-group">
                <label>이메일 주소</label>
                <input type="email" name="email" placeholder="email@example.com" required>
            </div>
            <div class="input-group">
                <label>문의 내용</label>
                <textarea name="message" rows="5" placeholder="제안하실 내용을 적어주세요." required></textarea>
            </div>
            <button type="submit">문의 보내기</button>
        </form>
    </div>
</body>
</html>
