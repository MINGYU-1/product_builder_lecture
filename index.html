<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>제휴 문의</title>
    <style>
        :root { --primary: #2563eb; --bg: #f8fafc; --card: #ffffff; --text: #1e293b; }
        body { font-family: -apple-system, sans-serif; background-color: var(--bg); color: var(--text); display: flex; justify-content: center; align-items: center; min-height: 100vh; margin: 0; padding: 20px; }
        .container { background: var(--card); padding: 40px; border-radius: 20px; box-shadow: 0 10px 25px rgba(0,0,0,0.05); width: 100%; max-width: 450px; }
        .header { text-align: center; margin-bottom: 30px; }
        .header h1 { font-size: 24px; font-weight: 800; margin: 0; color: var(--primary); }
        .header p { margin-top: 8px; color: #64748b; font-size: 14px; }
        .form-group { margin-bottom: 20px; }
        label { display: block; font-size: 14px; font-weight: 600; margin-bottom: 8px; color: #475569; }
        input, textarea { width: 100%; padding: 12px 16px; border: 1.5px solid #e2e8f0; border-radius: 10px; font-size: 15px; box-sizing: border-box; transition: 0.2s; }
        input:focus, textarea:focus { outline: none; border-color: var(--primary); box-shadow: 0 0 0 4px rgba(37, 99, 235, 0.1); }
        textarea { height: 130px; resize: none; }
        button { width: 100%; padding: 14px; background-color: var(--primary); color: white; border: none; border-radius: 12px; font-size: 16px; font-weight: 700; cursor: pointer; transition: 0.2s; }
        button:hover { background-color: #1d4ed8; transform: translateY(-1px); }
        button:active { transform: translateY(0); }
    </style>
</head>
<body>
    <div class="container">
        <div class="header">
            <h1>🤝 제휴 문의</h1>
            <p>비즈니스 협업을 위한 소중한 제안을 남겨주세요.</p>
        </div>
        
        <!-- 새로운 Formspree 주소 반영 -->
        <form action="https://formspree.io/f/xyknyeal" method="POST">
            <div class="form-group">
                <label>회신받을 이메일</label>
                <input type="email" name="email" placeholder="example@domain.com" required>
            </div>
            
            <div class="form-group">
                <label>성함 / 업체명</label>
                <input type="text" name="name" placeholder="홍길동 / (주)파트너" required>
            </div>

            <div class="form-group">
                <label>문의 상세 내용</label>
                <textarea name="message" placeholder="상세한 제안 내용을 입력해주세요." required></textarea>
            </div>

            <button type="submit">제휴 문의 보내기</button>
        </form>
    </div>
</body>
</html>
