<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>제휴 문의 전송</title>
    <style>
        body { font-family: sans-serif; display: flex; justify-content: center; align-items: center; height: 100vh; margin: 0; background-color: #f5f5f5; }
        .box { background: white; padding: 40px; border-radius: 10px; box-shadow: 0 4px 6px rgba(0,0,0,0.1); width: 300px; }
        input, textarea { width: 100%; margin-bottom: 15px; padding: 10px; border: 1px solid #ccc; border-radius: 5px; box-sizing: border-box; }
        button { width: 100%; padding: 12px; background-color: #007bff; color: white; border: none; border-radius: 5px; cursor: pointer; font-weight: bold; }
        button:hover { background-color: #0056b3; }
    </style>
</head>
<body>
    <div class="box">
        <h2>🤝 제휴 문의</h2>
        <!-- 아래 줄에 정확히 method="POST"가 들어가 있습니다. -->
        <form action="https://formspree.io/f/mjgavywe" method="POST">
            <input type="text" name="name" placeholder="성함" required>
            <input type="email" name="email" placeholder="이메일" required>
            <textarea name="message" placeholder="문의 내용" rows="4" required></textarea>
            <button type="submit">지금 보내기</button>
        </form>
    </div>
</body>
</html>
