<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>제휴 문의 센터</title>
    <style>
        :root {
            --primary: #2563eb;
            --primary-dark: #1d4ed8;
            --bg: #f8fafc;
            --card: #ffffff;
            --text: #1e293b;
        }
        body {
            font-family: 'Pretendard', -apple-system, BlinkMacSystemFont, system-ui, Roboto, sans-serif;
            background-color: var(--bg);
            color: var(--text);
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            margin: 0;
            padding: 20px;
        }
        .container {
            background: var(--card);
            padding: 40px;
            border-radius: 20px;
            box-shadow: 0 10px 25px -5px rgba(0, 0, 0, 0.1), 0 8px 10px -6px rgba(0, 0, 0, 0.1);
            width: 100%;
            max-width: 480px;
            transition: transform 0.3s ease;
        }
        .container:hover {
            transform: translateY(-5px);
        }
        .header {
            text-align: center;
            margin-bottom: 32px;
        }
        .header h1 {
            font-size: 24px;
            font-weight: 800;
            margin: 0;
            color: var(--primary);
            letter-spacing: -0.025em;
        }
        .header p {
            margin-top: 8px;
            color: #64748b;
            font-size: 15px;
        }
        .form-group {
            margin-bottom: 20px;
        }
        label {
            display: block;
            font-size: 14px;
            font-weight: 600;
            margin-bottom: 8px;
            color: #475569;
        }
        input, textarea {
            width: 100%;
            padding: 12px 16px;
            border: 1.5px solid #e2e8f0;
            border-radius: 10px;
            font-size: 15px;
            transition: all 0.2s;
            box-sizing: border-box;
            background: #fdfdfd;
        }
        input:focus, textarea:focus {
            outline: none;
            border-color: var(--primary);
            box-shadow: 0 0 0 4px rgba(37, 99, 235, 0.1);
            background: #fff;
        }
        textarea {
            height: 140px;
            resize: none;
        }
        button {
            width: 100%;
            padding: 14px;
            background-color: var(--primary);
            color: white;
            border: none;
            border-radius: 12px;
            font-size: 16px;
            font-weight: 700;
            cursor: pointer;
            transition: all 0.2s;
            margin-top: 10px;
        }
        button:hover {
            background-color: var(--primary-dark);
            box-shadow: 0 4px 12px rgba(37, 99, 235, 0.2);
        }
        button:active {
            transform: scale(0.98);
        }
        .footer-note {
            text-align: center;
            margin-top: 24px;
            font-size: 12px;
            color: #94a3b8;
        }
    </style>
</head>
<body>
    <div class="container">
        <div class="header">
            <h1>🤝 제휴 문의 센터</h1>
            <p>성공적인 파트너십을 위해 내용을 남겨주세요.</p>
        </div>
        
        <form action="https://formspree.io/f/mjgavywe" method="POST">
            <div class="form-group">
                <label for="email">회신받을 이메일</label>
                <input type="email" id="email" name="email" placeholder="example@domain.com" required>
            </div>
            
            <div class="form-group">
                <label for="name">성함 / 업체명</label>
                <input type="text" id="name" name="name" placeholder="홍길동 / (주)파트너" required>
            </div>

            <div class="form-group">
                <label for="message">문의 상세 내용</label>
                <textarea id="message" name="message" placeholder="제휴하고 싶은 서비스나 구체적인 제안 내용을 입력해주세요." required></textarea>
            </div>

            <button type="submit">제휴 문의 보내기</button>
        </form>

        <div class="footer-note">
            보내주신 내용은 영업일 기준 3일 이내에 검토 후 연락드립니다.
        </div>
    </div>
</body>
</html>
